# Taskfile for the Coding Agent From Scratch project (agent + docs site).
# Uses go-task: https://taskfile.dev  —  install with `brew install go-task`.
#
# Quick start:
#   task tui           # launch the agent in the full-screen Textual UI
#   task agent -- "summarize src/tools.py"   # run the agent in the terminal
#   task docs:dev      # install deps if needed, then serve with hot reload
#
# Run `task` with no args to list everything.
version: "3"

vars:
  WEBSITE_DIR: website

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  agent:
    desc: Run the agent in the terminal (stdout). Pass a task after `--`, e.g. `task agent -- "fix the bug in tools.py"`; with no task it prompts interactively. Use `--dir <path>` to run against another folder.
    interactive: true
    cmds:
      - uv run main.py {{.CLI_ARGS}}

  tui:
    desc: Launch the agent in the full-screen Textual UI. Pass a task after `--`, e.g. `task tui -- "summarize src/tools.py"`; with no task it prompts interactively. For hot reload use `task tui:hot` (NOT `task tui --hot-reload` — go-task rejects the bare flag).
    interactive: true
    env:
      AGENT_UI: tui
    cmds:
      - uv run main.py {{.CLI_ARGS}}

  tui:hot:
    desc: Launch the TUI with hot reload — auto-restarts on changes under src/tui. Enabled via AGENT_HOT_RELOAD so no `--` is needed.
    interactive: true
    env:
      AGENT_UI: tui
      AGENT_HOT_RELOAD: "1"
    cmds:
      - uv run main.py {{.CLI_ARGS}}

  tui:ollama:
    desc: >-
      Launch the TUI against local Ollama with dual-model routing (ADR-0015):
      gpt-oss:120b drives reasoning + tool calls, qwen3-coder:30b does the code
      edits via the write_code tool. Needs `ollama serve` running with both
      models pulled. The `ollama_chat/` prefix is REQUIRED for tool calling —
      the `ollama/` prefix routes to /api/generate, which ignores tools and
      returns empty. Override either with AGENT_MODEL / AGENT_CODE_MODEL (e.g.
      AGENT_MODEL=ollama_chat/gpt-oss:20b for a faster driver on modest hardware).
    interactive: true
    env:
      AGENT_UI: tui
      AGENT_MODEL: ollama_chat/gpt-oss:120b
      AGENT_CODE_MODEL: ollama_chat/qwen3-coder:30b
      # Force the LiteLLM/Ollama path. Without this, a stray USE_CLAUDE_CLI_LLM=1
      # in .env would route every turn to `claude -p` and ignore Ollama entirely.
      # load_dotenv() does not override an already-set var, so this wins.
      USE_CLAUDE_CLI_LLM: "0"
    cmds:
      - uv run main.py {{.CLI_ARGS}}

  eval:ollama:
    desc: >-
      Run the tool-calling eval across every chat-capable model in local Ollama
      and print a comparison matrix (pass rate + tool calls / errors / unknowns).
      Embedding models are skipped automatically. Add `-- --limit 3` to shorten,
      or `-- --out runs.jsonl` to persist. Forces the LiteLLM/Ollama path.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "15"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run toolcall --ollama-all {{.CLI_ARGS}}

  eval:ollama:reasoning:
    desc: >-
      Run the reasoning eval (multi-step word/logic problems, graded on the final
      answer) across every chat-capable local Ollama model. Add `-- --limit 3` to
      shorten or `-- --out runs.jsonl` to persist.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "15"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run reasoning --ollama-all {{.CLI_ARGS}}

  eval:ollama:planning:
    desc: >-
      Run the planning eval (produce a valid ordered plan under dependency
      constraints, graded on the answer) across every chat-capable local Ollama
      model. Tool-less models (gemma3) run via the no-tools fallback.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "15"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run planning --ollama-all {{.CLI_ARGS}}

  eval:ollama:coding:
    desc: >-
      Run the coding eval (standalone functions graded by hidden pytest) across
      every chat-capable local Ollama model. Set AGENT_CODE_MODEL to also exercise
      the write_code delegation. Add `-- --limit 3` to shorten.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "15"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run coding --ollama-all {{.CLI_ARGS}}

  eval:ollama:gsm8k:
    desc: >-
      Run GSM8K (1319 grade-school math problems, answer-graded) across every
      chat-capable local Ollama model. Large N for reliable reasoning comparison;
      fetched on demand. ALWAYS pass `-- --limit N` (e.g. 20) — the full set is
      huge.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "6"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run gsm8k --ollama-all {{.CLI_ARGS}}

  eval:ollama:humaneval:
    desc: >-
      Run HumanEval (164 function-completion problems, hidden-pytest graded)
      across every chat-capable local Ollama model. Standard coding benchmark,
      fetched on demand. Use `-- --limit N` to subsample.
    env:
      USE_CLAUDE_CLI_LLM: "0"
      AGENT_MEMORY_ENABLED: "0"
      AGENT_MAX_ITERATIONS: "15"
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.run humaneval --ollama-all {{.CLI_ARGS}}

  eval:report:
    desc: >-
      Regenerate the HTML report (eval-report.html) from the accumulated run
      history in evals/runs.jsonl, then open it. Eval runs append there by
      default, so this rebuilds the leaderboard + trend charts on demand.
      Override paths with `task eval:report IN=other.jsonl OUT=other.html`, or set
      a title with `-- --title "My Evals"`.
    vars:
      IN: '{{.IN | default "evals/runs.jsonl"}}'
      OUT: '{{.OUT | default "eval-report.html"}}'
    env:
      PYTHONPATH: src
    cmds:
      - uv run python -m evals.report_html --in {{.IN}} --out {{.OUT}} {{.CLI_ARGS}}
      - cmd: open {{.OUT}}
        platforms: [darwin]
        ignore_error: true

  docs:install:
    desc: Install the documentation site's npm dependencies
    dir: "{{.WEBSITE_DIR}}"
    # Only reinstall when the lockfile/manifest is newer than node_modules.
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm install

  docs:dev:
    desc: Serve the docs locally with hot reload at http://localhost:3000
    deps: [docs:install]
    dir: "{{.WEBSITE_DIR}}"
    cmds:
      - npm run start

  docs:build:
    desc: Build the static documentation site into website/build
    deps: [docs:install]
    dir: "{{.WEBSITE_DIR}}"
    cmds:
      - npm run build

  docs:serve:
    desc: Preview the production build at http://localhost:3000 (run docs:build first)
    deps: [docs:build]
    dir: "{{.WEBSITE_DIR}}"
    cmds:
      - npm run serve

  docs:clean:
    desc: Remove the Docusaurus build output and cache
    dir: "{{.WEBSITE_DIR}}"
    cmds:
      - npm run clear
      - rm -rf build
